<div class="history-container">
  <div class="history-header">
    <button id="btn-prev-year" class="btn btn-ghost btn-sm">&lt;</button>
    <span id="year-display" class="year-display">2026</span>
    <button id="btn-next-year" class="btn btn-ghost btn-sm">&gt;</button>
  </div>

  <div class="calendar-legend">
    <span class="legend-label">少</span>
    <span class="legend-cell count-0"></span>
    <span class="legend-cell count-1"></span>
    <span class="legend-cell count-2"></span>
    <span class="legend-cell count-3"></span>
    <span class="legend-cell count-4"></span>
    <span class="legend-label">多</span>
  </div>

  <div id="calendar-grid" class="calendar-grid"></div>

  <div id="day-detail" class="day-detail">
    <p class="detail-empty">点击日期查看详情</p>
  </div>
</div>
